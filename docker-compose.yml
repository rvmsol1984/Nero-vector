version: "3.8"

# NERO Vector - UAL ingest service
#
# Assumes the existing Hetzner stack already provides a PostgreSQL
# instance reachable on the 'nero' overlay network as host 'postgres'.
# Override POSTGRES_HOST in .env if your Postgres service name differs.

services:
  vector-ingest:
    build: .
    image: nero-vector/vector-ingest:latest
    container_name: vector-ingest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VECTOR_TENANTS_FILE: /app/tenants.json
      VECTOR_MIGRATIONS_DIR: /app/migrations
    volumes:
      - ./tenants.json:/app/tenants.json:ro
      - ./migrations:/app/migrations:ro
    networks:
      - nero
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  inky-receiver:
    # Same image as vector-ingest -- just runs the FastAPI app in
    # vector_ingest.inky_receiver instead of the poll loop.
    image: nero-vector/vector-ingest:latest
    container_name: vector-inky-receiver
    restart: unless-stopped
    depends_on:
      - vector-ingest
    env_file:
      - .env
    environment:
      INKY_LOG_LEVEL: INFO
    command:
      - uvicorn
      - vector_ingest.inky_receiver:app
      - --host
      - 0.0.0.0
      - --port
      - "3007"
    ports:
      - "3007:3007"
    networks:
      - nero
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  nero:
    external: true
