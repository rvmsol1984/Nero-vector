version: "3.8"
services:
  vector-ingest:
    build: .
    image: nero-vector/vector-ingest:latest
    container_name: vector-ingest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VECTOR_TENANTS_FILE: /app/tenants.json
      VECTOR_MIGRATIONS_DIR: /app/migrations
    volumes:
      - ./tenants.json:/app/tenants.json:ro
      - ./migrations:/app/migrations:ro
    extra_hosts:
      - "host.docker.internal:172.24.0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
  inky-receiver:
    image: nero-vector/vector-ingest:latest
    container_name: vector-inky-receiver
    restart: unless-stopped
    depends_on:
      - vector-ingest
    env_file:
      - .env
    environment:
      INKY_LOG_LEVEL: INFO
    command:
      - uvicorn
      - vector_ingest.inky_receiver:app
      - --host
      - 0.0.0.0
      - --port
      - "3007"
    ports:
      - "3007:3007"
    extra_hosts:
      - "host.docker.internal:172.24.0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
  edr-receiver:
    image: nero-vector/vector-ingest:latest
    container_name: vector-edr-receiver
    restart: unless-stopped
    depends_on:
      - vector-ingest
    env_file:
      - .env
    environment:
      EDR_LOG_LEVEL: INFO
    command:
      - uvicorn
      - vector_ingest.edr_receiver:app
      - --host
      - 0.0.0.0
      - --port
      - "3008"
    ports:
      - "3008:3008"
    extra_hosts:
      - "host.docker.internal:172.24.0.1"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
