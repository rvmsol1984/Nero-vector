version: "3.8"

# NERO Vector - operator-facing web UI + PKCE auth sidecar
#
# vector-ui serves the FastAPI /api + /health endpoints and the built
# React SPA. auth-server is a separate Node/Express process that owns
# /auth/* (Microsoft PKCE flow, SQLite session store). An upstream
# nginx (see nginx/vector.rvmsol.com.conf) fronts both services and
# Cloudflare terminates TLS.
#
# Usage:
#   cd vector_ui && docker compose up -d --build

services:
  vector-ui:
    build:
      # Build context is the repo root so the Dockerfile can pull
      # vector_ingest/inky_receiver.py into the image alongside the
      # vector_ui backend + frontend bundle.
      context: ..
      dockerfile: vector_ui/Dockerfile
    image: nero-vector/vector-ui:latest
    container_name: vector-ui
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VECTOR_UI_LOG_LEVEL: INFO
    ports:
      - "3005:3005"
    networks:
      - nero-vector_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  auth-server:
    build:
      context: ./auth-server
      dockerfile: Dockerfile
    image: nero-vector/auth-server:latest
    container_name: vector-auth-server
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: "3006"
      AZURE_CLIENT_ID: 4a38585b-ee28-4290-9dc0-fe70cc457fbb
      AZURE_TENANT_ID: 12077321-d5c3-4d90-ad87-d19b58b2f847
      PUBLIC_BASE_URL:   https://vector.rvmsol.com
      SESSION_DB_DIR:    /data
      CORS_ORIGINS:      "http://78.46.92.112:3005,https://vector.rvmsol.com"
    volumes:
      - vector-auth-sessions:/data
    ports:
      - "3006:3006"
    networks:
      - nero-vector_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  vector-auth-sessions:

networks:
  nero-vector_default:
    external: true
