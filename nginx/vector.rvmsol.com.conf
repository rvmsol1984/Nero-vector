# NERO Vector reverse proxy.
#
# Cloudflare terminates TLS and forwards to this nginx (HTTP/80). The
# `proxy_set_header X-Forwarded-Proto https` line is what lets
# express-session treat its `secure: true` cookie as valid even though
# the hop from Cloudflare -> nginx -> node is plain HTTP behind the
# edge.
#
# Deploy:
#   sudo install -m 644 nginx/vector.rvmsol.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/vector.rvmsol.com.conf \
#              /etc/nginx/sites-enabled/vector.rvmsol.com.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name vector.rvmsol.com;

    # --- access / error logs ---
    access_log /var/log/nginx/vector.rvmsol.com.access.log;
    error_log  /var/log/nginx/vector.rvmsol.com.error.log;

    # Larger body for INKY webhook bursts.
    client_max_body_size 2m;

    # ---------------------------------------------------------------
    # /auth/*  ->  Node PKCE auth server on 3006
    #
    # The FastAPI app on :3005 does NOT handle /auth/* at all -- these
    # routes terminate at nginx and are forwarded straight to the
    # express auth sidecar. The SPA calls /auth/login, /auth/me, etc.
    # same-origin; nginx is the only thing that knows they live on a
    # different backend.
    # ---------------------------------------------------------------
    location /auth/ {
        proxy_pass         http://vector-auth-server:3006;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        # Don't rewrite the Set-Cookie path; keep session cookie on /.
        proxy_cookie_path  / /;

        proxy_read_timeout 60s;
    }

    # ---------------------------------------------------------------
    # everything else  ->  FastAPI + SPA on 3005
    # ---------------------------------------------------------------
    location / {
        proxy_pass         http://vector-ui:3005;

        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
